name: tests-pr

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      core: ${{ steps.filter.outputs.core }}
      redis: ${{ steps.filter.outputs.redis }}
      mysql: ${{ steps.filter.outputs.mysql }}
      postgres: ${{ steps.filter.outputs.postgres }}
      sqlite: ${{ steps.filter.outputs.sqlite }}
      mongo: ${{ steps.filter.outputs.mongo }}
      memcache: ${{ steps.filter.outputs.memcache }}
      valkey: ${{ steps.filter.outputs.valkey }}
      etcd: ${{ steps.filter.outputs.etcd }}
      dynamo: ${{ steps.filter.outputs.dynamo }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            core:
              - 'core/**'
              - 'serialization/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'tsconfig.base.json'
            redis:
              - 'storage/redis/**'
            mysql:
              - 'storage/mysql/**'
            postgres:
              - 'storage/postgres/**'
            sqlite:
              - 'storage/sqlite/**'
            mongo:
              - 'storage/mongo/**'
            memcache:
              - 'storage/memcache/**'
            valkey:
              - 'storage/valkey/**'
            etcd:
              - 'storage/etcd/**'
            dynamo:
              - 'storage/dynamo/**'

  test:
    needs: detect-changes
    runs-on: ubuntu-latest
    timeout-minutes: 30
    name: Node 24 (filtered)
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Start Services
        run: pnpm test:services:start

      - name: Install Dependencies
        run: pnpm install

      - name: Approve Builds
        run: pnpm approve-builds

      - name: Build
        run: pnpm build

      # If core changed, run everything
      - name: Test All Packages
        if: needs.detect-changes.outputs.core == 'true'
        run: pnpm test

      # If core didn't change, always test core + compression
      - name: Test Core Packages
        if: needs.detect-changes.outputs.core != 'true'
        run: pnpm --filter keyv --filter @keyv/serialize --filter @keyv/test-suite --filter @keyv/bigmap --filter @keyv/compress-brotli --filter @keyv/compress-gzip --filter @keyv/compress-lz4 test:ci

      # Conditionally test each storage adapter
      - name: Test Redis
        if: needs.detect-changes.outputs.core != 'true' && needs.detect-changes.outputs.redis == 'true'
        run: pnpm --filter @keyv/redis test:ci

      - name: Test MySQL
        if: needs.detect-changes.outputs.core != 'true' && needs.detect-changes.outputs.mysql == 'true'
        run: pnpm --filter @keyv/mysql test:ci

      - name: Test PostgreSQL
        if: needs.detect-changes.outputs.core != 'true' && needs.detect-changes.outputs.postgres == 'true'
        run: pnpm --filter @keyv/postgres test:ci

      - name: Test SQLite
        if: needs.detect-changes.outputs.core != 'true' && needs.detect-changes.outputs.sqlite == 'true'
        run: pnpm --filter @keyv/sqlite test:ci

      - name: Test MongoDB
        if: needs.detect-changes.outputs.core != 'true' && needs.detect-changes.outputs.mongo == 'true'
        run: pnpm --filter @keyv/mongo test:ci

      - name: Test Memcache
        if: needs.detect-changes.outputs.core != 'true' && needs.detect-changes.outputs.memcache == 'true'
        run: pnpm --filter @keyv/memcache test:ci

      - name: Test Valkey
        if: needs.detect-changes.outputs.core != 'true' && needs.detect-changes.outputs.valkey == 'true'
        run: pnpm --filter @keyv/valkey test:ci

      - name: Test Etcd
        if: needs.detect-changes.outputs.core != 'true' && needs.detect-changes.outputs.etcd == 'true'
        run: pnpm --filter @keyv/etcd test:ci

      - name: Test DynamoDB
        if: needs.detect-changes.outputs.core != 'true' && needs.detect-changes.outputs.dynamo == 'true'
        run: pnpm --filter @keyv/dynamo test:ci
